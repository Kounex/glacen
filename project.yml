name: Glacen
options:
  bundleIdPrefix: com.kounex
  deploymentTarget:
    iOS: "26.0"
  xcodeVersion: "26.0"
  createIntermediateGroups: true
  generateEmptyDirectories: true
  defaultConfig: Debug

settings:
  base:
    SWIFT_VERSION: "6.0"
    DEVELOPMENT_TEAM: ${DEVELOPMENT_TEAM}
    GENERATE_INFOPLIST_FILE: YES
    CURRENT_PROJECT_VERSION: 1
    MARKETING_VERSION: "0.1.0"
    CODE_SIGN_STYLE: Automatic

targets:
  Glacen:
    type: application
    platform: iOS
    deploymentTarget: "26.0"
    sources:
      - path: Glacen
        excludes:
          - "**/.DS_Store"
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.kounex.glacen
        DEVELOPMENT_TEAM: ${DEVELOPMENT_TEAM}
        CODE_SIGN_STYLE: Automatic
        INFOPLIST_KEY_CFBundleDisplayName: Glacen
        INFOPLIST_KEY_UIApplicationSceneManifest_Generation: YES
        INFOPLIST_KEY_UILaunchScreen_Generation: YES
        INFOPLIST_KEY_UISupportedInterfaceOrientations_iPhone: "UIInterfaceOrientationPortrait"
        SWIFT_STRICT_CONCURRENCY: complete
        REDDIT_CLIENT_ID: ${REDDIT_CLIENT_ID}
      configs:
        Debug:
          SWIFT_ACTIVE_COMPILATION_CONDITIONS: DEBUG
        Release:
          SWIFT_ACTIVE_COMPILATION_CONDITIONS: ""
    info:
      # XcodeGen 2.45.4 requires an explicit info.path when info.properties is set
      path: Glacen/Info.plist
      properties:
        CFBundleURLTypes:
          - CFBundleURLName: "Reddit OAuth Callback"
            CFBundleURLSchemes:
              - glacen
        RedditClientID: "$(REDDIT_CLIENT_ID)"
    dependencies: []

  GlacenTests:
    type: bundle.unit-test
    platform: iOS
    deploymentTarget: "26.0"
    sources:
      - path: GlacenTests
    settings:
      base:
        SWIFT_STRICT_CONCURRENCY: complete
    dependencies:
      - target: Glacen

schemes:
  Glacen:
    build:
      targets:
        Glacen: all
        GlacenTests: [test]
    test:
      config: Debug
      targets:
        - GlacenTests
    run:
      config: Debug
    profile:
      config: Debug
    archive:
      config: Debug
